name: Auto Assign RepoMark Alias (Scheduled)

on:
  schedule:
    - cron: '0 * * * *' # Spustí se automaticky každou hodinu
  workflow_dispatch: # Umožní skript kdykoliv spustit ručně

jobs:
  assign-alias:
    runs-on: ubuntu-latest
    steps:
      - name: Scan and Process Repository Aliases and Dates
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.PERSONAL_PROJECT_TOKEN }}
          script: |
            // === 1. OBECNÁ ID PROJEKTU A POLÍ ===
            const userLogin = "jmalak";
            const projectNumber = 1; 
            const projectId = "PVT_kwHOAB7H7M4BZk7B";
            
            const repoMarkFieldId = "PVTSSF_lAHOAB7H7M4BZk7BzhUjAmA"; // ID pro RepoMark
            const updatedFieldId = "PVTF_lAHOAB7H7M4BZk7BzhUkRVM"; // ID pro tvé nové pole "Updated"

            // === MAPOVÁNÍ REPOZITÁŘŮ NA BAREVNÉ MOŽNOSTI ===
            const aliasMapping = {
              "open-watcom-v2": "5f088986", // V2
              "setup-watcom": "0b0ebbc0"    // Setup
            };

            let hasNextPage = true;
            let afterCursor = null;
            let totalProcessed = 0;

            // 2. DOTAZ: Stahujeme už i updatedAt přímo z issue/PR
            const fetchQuery = `
              query($user: String!, $number: Int!, $after: String) {
                user(login: $user) {
                  projectV2(number: $number) {
                    items(first: 100, after: $after) {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes {
                        id
                        content {
                          ... on Issue { 
                            updatedAt
                            repository { name } 
                          }
                          ... on PullRequest { 
                            updatedAt
                            repository { name } 
                          }
                        }
                        fieldValues(first: 100) {
                          nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              field { ... on ProjectV2FieldCommon { name } }
                              optionId
                            }
                            ... on ProjectV2ItemFieldDateValue {
                              field { ... on ProjectV2FieldCommon { name } }
                              date
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            // Mutace pro zápis výběru (RepoMark)
            const updateSelectMutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId, itemId: $itemId, fieldId: $fieldId,
                  value: { singleSelectOptionId: $optionId }
                }) { projectV2Item { id } }
              }
            `;

            // Mutace pro zápis datumu (Updated z repozitáře)
            const updateDateMutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $date: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId, itemId: $itemId, fieldId: $fieldId,
                  value: { date: $date }
                }) { projectV2Item { id } }
              }
            `;

            // 3. HLAVNÍ CYKLUS
            while (hasNextPage) {
              const result = await github.graphql(fetchQuery, {
                user: userLogin,
                number: projectNumber,
                after: afterCursor
              });

              const projectV2 = result?.user?.projectV2;
              if (!projectV2 || !projectV2.items) break;

              const projectItems = projectV2.items;
              const items = projectItems.nodes || [];

              hasNextPage = projectItems.pageInfo?.hasNextPage || false;
              afterCursor = projectItems.pageInfo?.endCursor || null;

              for (const item of items) {
                const repoName = item.content?.repository?.name;
                const repoUpdatedAt = item.content?.updatedAt; // Čas z repozitáře
                if (!repoName) continue;

                // Kontrola aktuálních hodnot v projektu, abychom nezapisovali zbytečně
                const fieldNodes = item.fieldValues?.nodes || [];
                
                const currentRepoMark = fieldNodes.find(f => f?.field?.name === "RepoMark");
                const currentUpdatedField = fieldNodes.find(f => f?.field?.name === "Updated"); // Název tvého nového sloupce

                let itemChanged = false;

                // A. AKTUALIZACE REPOMARK (Zapisuje se jen, pokud chybí)
                if (!currentRepoMark) {
                  const targetOptionId = aliasMapping[repoName];
                  if (targetOptionId) {
                    try {
                      await github.graphql(updateSelectMutation, {
                        projectId, itemId: item.id, fieldId: repoMarkFieldId, optionId: targetOptionId
                      });
                      itemChanged = true;
                    } catch (e) {
                      console.error(`Chyba RepoMark u ${item.id}:`, e.message);
                    }
                  }
                }

                // B. AKTUALIZACE DATUMU (Zapisuje/přepisuje se vždy, když se čas v issue změní)
                if (repoUpdatedAt) {
                  // Ořízneme čas na formát YYYY-MM-DD, který vyžaduje GitHub Project Date pole
                  const repoDateOnly = repoUpdatedAt.split('T')[0]; 
                  const currentDateOnly = currentUpdatedField?.date;

                  if (currentDateOnly !== repoDateOnly) {
                    try {
                      await github.graphql(updateDateMutation, {
                        projectId, itemId: item.id, fieldId: updatedFieldId, date: repoDateOnly
                      });
                      itemChanged = true;
                    } catch (e) {
                      console.error(`Chyba datumu u ${item.id}:`, e.message);
                    }
                  }
                }

                if (itemChanged) totalProcessed++;
              }
            }

            console.log(`=========================================`);
            console.log(`Zpracování dokončeno. Aktualizováno řádků: ${totalProcessed}`);
            console.log(`=========================================`);
