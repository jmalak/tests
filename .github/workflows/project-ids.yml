name: Zjistit ID v projektu

on:
  workflow_dispatch: # Umožní spustit skript ručně jedním kliknutím

jobs:
  print-ids:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch IDs from GitHub
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.PERSONAL_PROJECT_TOKEN }}
          script: |
            const query = `
              query {
                user(login: "jmalak") {
                  projectV2(number: 1) {
                    id
                    # První pole: RepoMark
                    poleRepo: field(name: "RepoMark") {
                      ... on ProjectV2SingleSelectField {
                        id
                        options { id name }
                      }
                    }
                    # Druhé pole: UpdatedAt
                    poleUpdatedAt: field(name: "UpdatedAt") {
                      ... on ProjectV2Field {
                        id
                      }
                    }
                  }
                }
              }
            `;
            const result = await github.graphql(query);
            const project = result.user.projectV2;

            console.log("=========================================");
            console.log("ID VAŠEHO PROJEKTU:", project.id);
            console.log("-----------------------------------------");
            console.log("ID SLOUPCE 'RepoMark':", project.poleRepo?.id);
            console.log(JSON.stringify(result.user.projectV2.field.options, null, 2));
            console.log("-----------------------------------------");
            console.log("ID SLOUPCE 'UpdatedAt':", project.poleUpdatedAt?.id);
